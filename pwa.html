<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>Orbit</title>
  <style>
    :root {
      --bg:#F2F2F7; --card:#FFFFFF; --text:#000;
      --sub:#8E8E93; --border:rgba(60,60,67,0.12);
      --blue:#007AFF; --green:#34C759; --red:#FF3B30;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    #app { flex:1; overflow:hidden; position:relative; }
    .page { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; padding-bottom:calc(16px + env(safe-area-inset-bottom)); display:none; }
    .page.active { display:block; }
    #tabbar { display:flex; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); }
    .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; padding:6px 0; border:none; background:none; cursor:pointer; color:var(--sub); font-size:9px; font-family:inherit; }
    .tab.active { color:var(--blue); }
    .tab-icon { font-size:20px; line-height:1.2; }
    .card { background:var(--card); border-radius:12px; padding:16px; margin-bottom:12px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .page-header h1 { font-size:22px; font-weight:700; }
    .btn { padding:10px 24px; border-radius:20px; border:none; font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; }
    .btn-green { background:var(--green); color:white; }
    .btn-blue  { background:var(--blue);  color:white; }
    .btn-sm    { padding:6px 14px; font-size:13px; border-radius:14px; }
    .section-title { font-size:12px; font-weight:600; color:var(--sub); letter-spacing:.3px; margin:14px 4px 8px; text-transform:uppercase; }
    /* Timer */
    #current-card { text-align:center; padding:24px 16px 18px; border-left:5px solid #E2E8F0; transition:border-color .3s; }
    #task-name { font-size:20px; font-weight:600; margin-bottom:8px; color:var(--sub); }
    #elapsed { font-size:54px; font-weight:200; font-variant-numeric:tabular-nums; letter-spacing:-2px; margin-bottom:18px; line-height:1; }
    .btn-row { display:flex; gap:10px; justify-content:center; }
    .task-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px; }
    .task-btn { padding:11px 10px; border-radius:10px; border:none; background:var(--card); font-size:13px; font-family:inherit; text-align:left; cursor:pointer; border-left:3px solid; line-height:1.3; }
    .task-btn.current { outline:2px solid; outline-offset:-1px; }
    .checkin-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .checkin-item:last-child { border-bottom:none; }
    .check-circle { width:22px; height:22px; border-radius:50%; border:2px solid #C7C7CC; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; transition:all .2s; }
    .check-circle.done { background:var(--green); border-color:var(--green); color:white; }

    /* ── Shared timeline grid ── */
    .tl-wrap { display:flex; }
    .tl-labels { width:44px; flex-shrink:0; position:relative; }
    .tl-label { position:absolute; right:6px; font-size:10px; color:var(--sub); transform:translateY(-50%); white-space:nowrap; }
    .tl-grid { flex:1; position:relative; background:var(--card); border-radius:10px; overflow:hidden; cursor:crosshair; }
    /* grid lines */
    .ln-hour    { position:absolute; left:0; right:0; border-top:1px solid rgba(60,60,67,0.2);  pointer-events:none; }
    .ln-half    { position:absolute; left:0; right:0; border-top:1px solid rgba(60,60,67,0.1);  pointer-events:none; }
    .ln-quarter { position:absolute; left:0; right:0; border-top:1px solid rgba(60,60,67,0.06); pointer-events:none; }
    /* grid overlay drawn ON TOP of blocks */
    .tl-grid.with-quarter::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:15;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.22) 0px,   rgba(0,0,0,0.22) 1px,
        transparent 1px,         transparent 22px,
        rgba(0,0,0,0.07) 22px,  rgba(0,0,0,0.07) 23px,
        transparent 23px,        transparent 44px,
        rgba(0,0,0,0.13) 44px,  rgba(0,0,0,0.13) 45px,
        transparent 45px,        transparent 67px,
        rgba(0,0,0,0.07) 67px,  rgba(0,0,0,0.07) 68px,
        transparent 68px,        transparent 90px
      );
      background-size: 100% 90px;
      background-position: 0 0;
    }
    .ln-now     { position:absolute; left:0; right:0; border-top:2px solid var(--red); z-index:10; pointer-events:none; }
    .ln-now-dot { position:absolute; left:-4px; top:-4px; width:8px; height:8px; background:var(--red); border-radius:50%; }
    /* blocks */
    .tl-block {
      position:absolute; left:2px; right:2px; border-radius:6px;
      overflow:hidden; color:white; user-select:none;
      display:flex; flex-direction:column; justify-content:flex-start; padding:3px 6px;
    }
    .tl-block .b-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
    .tl-block .b-time { font-size:10px; opacity:.8; white-space:nowrap; }
    .tl-block .b-rsz  { position:absolute; bottom:0; left:0; right:0; height:10px; cursor:ns-resize; background:rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; }
    .tl-block .b-rsz::after { content:''; width:20px; height:2px; background:rgba(255,255,255,0.7); border-radius:1px; }
    .tl-block.done { opacity:.4; }

    /* Stats */
    .view-toggle { display:flex; gap:6px; }
    .toggle-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:var(--card); font-size:13px; cursor:pointer; font-family:inherit; }
    .toggle-btn.active { background:var(--blue); color:white; border-color:var(--blue); }
    .range-row { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .range-btn { padding:5px 12px; border-radius:14px; border:1px solid var(--border); background:var(--card); font-size:13px; cursor:pointer; font-family:inherit; }
    .range-btn.active { background:var(--blue); color:white; border-color:var(--blue); }
    .stat-bar-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); }
    .stat-bar-row:last-child { border-bottom:none; }
    .stat-label { width:110px; font-size:13px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .stat-bar-wrap { flex:1; height:10px; background:var(--bg); border-radius:5px; overflow:hidden; }
    .stat-bar { height:100%; border-radius:5px; }
    .stat-val { width:38px; font-size:12px; color:var(--sub); text-align:right; font-variant-numeric:tabular-nums; }

    /* Backlog swipe */
    .backlog-wrap { overflow:hidden; position:relative; border-bottom:1px solid var(--border); background:var(--card); }
    .backlog-wrap:first-child { border-radius:12px 12px 0 0; }
    .backlog-wrap:last-child  { border-radius:0 0 12px 12px; border-bottom:none; }
    .backlog-wrap:only-child  { border-radius:12px; }
    .backlog-item { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; background:var(--card); transition:transform .2s ease; position:relative; z-index:1; will-change:transform; }
    .backlog-actions { position:absolute; right:0; top:0; bottom:0; display:flex; }
    .backlog-action-btn { border:none; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; padding:0 16px; color:white; }
    .backlog-action-btn.schedule { background:var(--blue); }
    .backlog-action-btn.del      { background:var(--red); }
    .backlog-dot  { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
    .backlog-meta { font-size:11px; color:var(--sub); margin-top:2px; }

    /* Modal */
    #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:flex-end; justify-content:center; }
    #modal-overlay.open { display:flex; }
    #modal { background:var(--card); border-radius:18px 18px 0 0; padding:20px 16px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:88dvh; overflow-y:auto; }
    #modal h2 { font-size:17px; font-weight:600; margin-bottom:14px; }
    .modal-task-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .modal-task-btn { padding:10px 8px; border-radius:10px; border:2px solid transparent; background:var(--bg); font-size:13px; font-family:inherit; text-align:left; cursor:pointer; border-left:3px solid; }
    .modal-task-btn.selected { border:2px solid var(--blue); background:rgba(0,122,255,.08); }
    .time-row { display:flex; gap:10px; margin-bottom:16px; }
    .time-iw { flex:1; }
    .time-iw label { font-size:12px; color:var(--sub); display:block; margin-bottom:4px; }
    .time-iw input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:16px; font-family:inherit; background:var(--bg); }
    .modal-btns { display:flex; gap:10px; }
    .modal-btns .btn { flex:1; }
    .action-btn { padding:14px; border-radius:12px; border:none; font-size:16px; font-family:inherit; cursor:pointer; text-align:center; margin-bottom:8px; display:block; width:100%; }
    .empty   { text-align:center; color:var(--sub); padding:36px 0; font-size:15px; }
    .loading { text-align:center; color:var(--sub); padding:20px 0; font-size:14px; }
  </style>
</head>
<body>
<div id="app">

  <!-- TIMER -->
  <div class="page active" id="page-timer">
    <div class="card" id="current-card">
      <div id="task-name">未开始</div>
      <div id="elapsed">—</div>
      <div class="btn-row" id="action-btns"></div>
    </div>
    <div class="section-title">工作</div>
    <div class="task-grid" id="work-tasks"></div>
    <div class="section-title">生活</div>
    <div class="task-grid" id="life-tasks"></div>
    <div class="section-title">今日打卡</div>
    <div class="card" id="checkin-list"><div class="loading">加载中…</div></div>
  </div>

  <!-- PLANNER (drag + resize) -->
  <div class="page" id="page-planner">
    <div class="page-header">
      <h1>计划</h1>
      <button class="btn btn-blue btn-sm" id="planner-add-btn">+ 添加</button>
    </div>
    <div id="planner-scroll"></div>
  </div>

  <!-- TODAY (15min grid, like Mac) -->
  <div class="page" id="page-timeline">
    <div class="page-header">
      <h1>今日记录</h1>
      <button class="btn btn-blue btn-sm" id="today-add-btn">+ 新增</button>
    </div>
    <div id="today-total" style="font-size:13px;color:var(--sub);margin-bottom:12px"></div>
    <div id="today-scroll"></div>
  </div>

  <!-- STATS -->
  <div class="page" id="page-stats">
    <div class="page-header">
      <h1>统计</h1>
      <div class="view-toggle">
        <button class="toggle-btn active" id="view-bar" onclick="setStatsView('bar')">条形</button>
        <button class="toggle-btn" id="view-pie" onclick="setStatsView('pie')">饼图</button>
      </div>
    </div>
    <div class="range-row" id="stats-range">
      <button class="range-btn active" data-days="7">近7天</button>
      <button class="range-btn" data-days="14">近14天</button>
      <button class="range-btn" data-days="30">近30天</button>
    </div>
    <div class="card" id="stats-content"><div class="loading">加载中…</div></div>
  </div>

  <!-- BACKLOG -->
  <div class="page" id="page-backlog">
    <div class="page-header"><h1>待安排</h1></div>
    <div id="backlog-list"><div class="loading">加载中…</div></div>
  </div>

</div>
<nav id="tabbar">
  <button class="tab active" data-page="timer">  <span class="tab-icon">⏱</span><span>计时</span></button>
  <button class="tab" data-page="planner">       <span class="tab-icon">📅</span><span>计划</span></button>
  <button class="tab" data-page="timeline">      <span class="tab-icon">📊</span><span>今日</span></button>
  <button class="tab" data-page="stats">         <span class="tab-icon">📈</span><span>统计</span></button>
  <button class="tab" data-page="backlog">       <span class="tab-icon">📋</span><span>待安排</span></button>
</nav>
<div id="modal-overlay"><div id="modal"></div></div>

<script>
const COLORS={'📈 交易学习':'#E07068','🔮 塔罗分析':'#9880CC','✍️ 写文章/卡片':'#E8956A','💻 折腾/开发':'#5B8FD4','📷 摄影/画廊':'#81D8D0','🗂️ 系统/杂事':'#64748B','😴 睡眠':'#6C5CE7','📱 刷手机':'#7AB0D4','☕ 放松/休息':'#8B5A38','🏃 运动':'#72B87A','🍽️ 吃饭/家务':'#DDB86A','🧘 冥想':'#68B868','📔 日记':'#E8A0BF'}
const PX=1.5, START=5*60, END=24*60
function c(t){return COLORS[t]||'#94A3B8'}
function fmt(s){s=Math.floor(s);const m=Math.floor(s/60),h=Math.floor(m/60);return h>0?`${h}:${String(m%60).padStart(2,'0')}`:`${m}m ${String(s%60).padStart(2,'0')}s`}
function fmtM(m){const h=Math.floor(m/60),r=m%60;return h>0?`${h}h${r>0?r+'m':''}`:`${r}m`}
function m2t(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function t2m(s){const[h,m]=s.split(':').map(Number);return h*60+(m||0)}
function tod(){return new Date().toLocaleDateString('sv-SE')}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function snap15(m){return Math.round(m/15)*15}
let appState=null,timerInt=null,statsDays=7,statsView='bar',selTask=null

// ── Tabs ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const p=btn.dataset.page
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active'); document.getElementById('page-'+p).classList.add('active')
    if(p==='planner')  loadPlanner()
    if(p==='timeline') loadToday()
    if(p==='stats')    loadStats()
    if(p==='backlog')  loadBacklog()
  })
})

// ── Modal ─────────────────────────────────────────────────────────
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modal-overlay').classList.add('open')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');selTask=null}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal()})

// ── Timer ─────────────────────────────────────────────────────────
async function sendCmd(action,task,item){
  const b={action,timestamp:new Date().toISOString()}
  if(task)b.task=task;if(item)b.item=item
  try{await fetch('/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})}catch(e){}
  await loadState()
}
async function loadState(){
  try{const r=await fetch('/state');appState=await r.json();renderTimer()}catch(e){}
}
function renderTimer(){
  if(!appState)return
  const task=appState.current_task,col=task?c(task):'#E2E8F0'
  document.getElementById('current-card').style.borderLeftColor=col
  const ne=document.getElementById('task-name');ne.textContent=task||'未开始';ne.style.color=task?col:'var(--sub)'
  if(task&&appState.task_start){document.getElementById('elapsed').textContent=fmt((Date.now()-new Date(appState.task_start).getTime())/1000);clearInterval(timerInt);timerInt=setInterval(()=>{document.getElementById('elapsed').textContent=fmt((Date.now()-new Date(appState.task_start).getTime())/1000)},1000)}
  else{clearInterval(timerInt);document.getElementById('elapsed').textContent='—'}
  const be=document.getElementById('action-btns');be.innerHTML=''
  if(task){const b=document.createElement('button');b.className='btn btn-green';b.textContent='结束';b.onclick=()=>sendCmd('finish');be.appendChild(b)}
  renderGrid('work-tasks',appState.work_tasks||[],task)
  renderGrid('life-tasks',appState.life_tasks||[],task)
  renderCheckin(appState.checkin_items||[],appState.checkin_done||[])
}
function renderGrid(id,tasks,cur){
  const el=document.getElementById(id);el.innerHTML=''
  tasks.forEach(t=>{const b=document.createElement('button');b.className='task-btn'+(t===cur?' current':'');b.textContent=t;b.style.borderLeftColor=c(t);b.style.color=c(t);if(t===cur)b.style.outlineColor=c(t);b.onclick=()=>sendCmd('start',t);el.appendChild(b)})
}
function renderCheckin(items,done){
  const el=document.getElementById('checkin-list')
  if(!items.length){el.innerHTML='<div class="empty">无打卡项目</div>';return}
  el.innerHTML=''
  items.forEach(item=>{const d=done.includes(item);const r=document.createElement('div');r.className='checkin-item';r.innerHTML=`<div class="check-circle ${d?'done':''}">${d?'✓':''}</div><span style="color:${d?'var(--sub)':'var(--text)'};text-decoration:${d?'line-through':'none'}">${item}</span>`;r.onclick=()=>sendCmd('checkin_toggle',null,item);el.appendChild(r)})
}

// ── Build timeline grid (shared, no drag) ────────────────────────
function buildTimelineGrid(containerId, blocks, onTapBlock, onTapEmpty, showQuarter=false) {
  const el=document.getElementById(containerId)
  const totalH=(END-START)*PX
  let labels='', lines=''
  for(let h=START/60;h<=END/60;h++){
    const y=(h*60-START)*PX
    labels+=`<div class="tl-label" style="top:${y}px">${String(h).padStart(2,'0')}:00</div>`
    lines+=`<div class="ln-hour" style="top:${y}px"></div>`
    if(h<END/60){
      if(showQuarter) lines+=`<div class="ln-quarter" style="top:${y+15*PX}px"></div>`
      lines+=`<div class="ln-half" style="top:${y+30*PX}px"></div>`
      if(showQuarter) lines+=`<div class="ln-quarter" style="top:${y+45*PX}px"></div>`
    }
  }
  const nm=nowMin(), ny=(Math.min(nm,END)-START)*PX
  const nowLine=nm>=START&&nm<=END?`<div class="ln-now" style="top:${ny}px"><div class="ln-now-dot"></div></div>`:''

  const grid=document.createElement('div'); grid.className='tl-grid'+(showQuarter?' with-quarter':''); grid.style.height=totalH+'px'
  grid.innerHTML=lines+nowLine

  blocks.forEach(b=>{
    const top=(b.start_min-START)*PX, h=Math.max((b.end_min-b.start_min)*PX,18)
    const col=b.color||c(b.text||b.category||'')
    const div=document.createElement('div')
    div.className='tl-block'+(b.done?' done':'')
    div.dataset.id=String(b.id??b._id??'')
    div.style.cssText=`top:${top}px;height:${h}px;background:${col}`
    div.innerHTML=`${h>20?`<div class="b-name">${b.text||b.category}</div>`:''}${h>34?`<div class="b-time">${m2t(b.start_min)}–${m2t(b.end_min)}</div>`:''}`
    div.addEventListener('click',e=>{e.stopPropagation();onTapBlock&&onTapBlock(b)})
    grid.appendChild(div)
  })

  if(onTapEmpty){
    grid.addEventListener('click',e=>{
      if(e.target===grid||e.target.classList.contains('ln-hour')||e.target.classList.contains('ln-half')||e.target.classList.contains('ln-quarter')){
        const rect=grid.getBoundingClientRect()
        const y=e.clientY-rect.top
        const min=snap15(START+y/PX)
        onTapEmpty(min)
      }
    })
  }

  const labelsEl=document.createElement('div'); labelsEl.className='tl-labels'; labelsEl.style.height=totalH+'px'; labelsEl.innerHTML=labels
  el.innerHTML=''; const wrap=document.createElement('div'); wrap.className='tl-wrap'; wrap.appendChild(labelsEl); wrap.appendChild(grid); el.appendChild(wrap)
  // scroll to now - 1h
  el.scrollTop=Math.max(0,(Math.min(nm,END)-START-60)*PX)
}

// ── Planner (draggable + resizable) ──────────────────────────────
async function loadPlanner(){
  const el=document.getElementById('planner-scroll'); el.innerHTML='<div class="loading">加载中…</div>'
  try{const r=await fetch(`/planner/${tod()}`);const d=await r.json();renderPlanner(d.blocks||[])}
  catch(e){el.innerHTML='<div class="empty">加载失败</div>'}
}

function renderPlanner(blocks){
  const el=document.getElementById('planner-scroll')
  const totalH=(END-START)*PX
  let labels='', lines=''
  for(let h=START/60;h<=END/60;h++){
    const y=(h*60-START)*PX
    labels+=`<div class="tl-label" style="top:${y}px">${String(h).padStart(2,'0')}:00</div>`
    lines+=`<div class="ln-hour" style="top:${y}px"></div>`
    if(h<END/60) lines+=`<div class="ln-half" style="top:${y+30*PX}px"></div>`
  }
  const nm=nowMin(),ny=(Math.min(nm,END)-START)*PX
  const nowLine=nm>=START&&nm<=END?`<div class="ln-now" style="top:${ny}px"><div class="ln-now-dot"></div></div>`:''

  const grid=document.createElement('div'); grid.className='tl-grid'; grid.style.height=totalH+'px'; grid.style.cursor='default'
  grid.innerHTML=lines+nowLine

  const sorted=[...blocks].sort((a,b)=>a.start_min-b.start_min)
  sorted.forEach(b=>grid.appendChild(makePlannerBlock(b)))

  // tap empty → add
  grid.addEventListener('click',e=>{
    if(e.target===grid||e.target.classList.contains('ln-hour')||e.target.classList.contains('ln-half')){
      const rect=grid.getBoundingClientRect(), min=snap15(START+(e.clientY-rect.top)/PX)
      showAddModal('planner', min)
    }
  })

  const labelsEl=document.createElement('div'); labelsEl.className='tl-labels'; labelsEl.style.height=totalH+'px'; labelsEl.innerHTML=labels
  el.innerHTML=''
  const wrap=document.createElement('div'); wrap.className='tl-wrap'; wrap.appendChild(labelsEl); wrap.appendChild(grid); el.appendChild(wrap)
  el.scrollTop=Math.max(0,(Math.min(nm,END)-START-60)*PX)
}

function makePlannerBlock(b){
  const top=(b.start_min-START)*PX, h=Math.max((b.end_min-b.start_min)*PX,20)
  const col=b.color||c(b.text)
  const ACT_W=110

  // wrapper (position:absolute, clips swipe)
  const wrap=document.createElement('div')
  wrap.style.cssText=`position:absolute;top:${top}px;height:${h}px;left:2px;right:2px;overflow:hidden;border-radius:6px;z-index:2`

  // action buttons behind
  const acts=document.createElement('div')
  acts.style.cssText=`position:absolute;right:0;top:0;bottom:0;display:flex;width:${ACT_W}px`
  acts.innerHTML=`<button style="flex:1;border:none;background:var(--green);color:white;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">完成</button><button style="flex:1;border:none;background:#FF9500;color:white;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Skip</button>`
  wrap.appendChild(acts)

  // block content
  const div=document.createElement('div')
  div.className='tl-block'+(b.done?' done':'')+(b.skipped?' done':'')
  div.style.cssText=`position:absolute;inset:0;background:${col};border-radius:6px;cursor:grab;transition:transform 0s`
  div.dataset.id=b.id; div.dataset.sm=b.start_min; div.dataset.em=b.end_min
  div.innerHTML=`${h>20?`<div class="b-name">${b.skipped?'⏭ ':b.done?'✓ ':''}${b.text}</div>`:''}${h>34?`<div class="b-time">${m2t(b.start_min)}–${m2t(b.end_min)}</div>`:''}${h>28?'<div class="b-rsz" data-rsz="1"></div>':''}`
  wrap.appendChild(div)

  // action btn handlers
  acts.children[0].addEventListener('click',()=>{ resetSwipe(); togglePlanDone(b.id) })
  acts.children[1].addEventListener('click',()=>{ resetSwipe(); openSkipModal(b.id, b.text) })

  let swiped=false
  function resetSwipe(){ div.style.transform=''; div.style.transition='transform .2s ease'; swiped=false }

  // ── touch gestures ────────────────────────────────────────────
  let tx=0, ty=0, dragStartY=0, dragStartMin=0, isDragging=false, isResizing=false, resizeStartY=0, resizeStartEM=0, gestureDecided=false, gestureIsSwipe=false

  div.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX; ty=e.touches[0].clientY
    gestureDecided=false; gestureIsSwipe=false
    if(e.target.dataset.rsz){
      isResizing=true; isDragging=false; gestureDecided=true; gestureIsSwipe=false
      resizeStartY=ty; resizeStartEM=parseInt(div.dataset.em)
    } else {
      isDragging=false; isResizing=false
      dragStartY=ty; dragStartMin=parseInt(div.dataset.sm)
    }
  },{passive:true})

  div.addEventListener('touchmove',e=>{
    const cx=e.touches[0].clientX, cy=e.touches[0].clientY
    const dx=cx-tx, dy=cy-ty
    if(!gestureDecided&&(Math.abs(dx)>6||Math.abs(dy)>6)){
      gestureIsSwipe=Math.abs(dx)>Math.abs(dy)
      gestureDecided=true
      if(!gestureIsSwipe) isDragging=true
    }
    if(gestureIsSwipe){
      e.preventDefault()
      const tx2=swiped?dx-ACT_W:dx
      div.style.transition='none'
      div.style.transform=`translateX(${Math.max(-ACT_W,Math.min(0,tx2))}px)`
      return
    }
    if(isResizing){
      e.preventDefault()
      const newEM=snap15(resizeStartEM+(cy-resizeStartY)/PX)
      const clampEM=Math.max(parseInt(div.dataset.sm)+15,Math.min(END,newEM))
      div.dataset.em=clampEM
      wrap.style.height=Math.max((clampEM-parseInt(div.dataset.sm))*PX,20)+'px'
      div.querySelector('.b-time')&&(div.querySelector('.b-time').textContent=`${m2t(parseInt(div.dataset.sm))}–${m2t(clampEM)}`)
    } else if(isDragging){
      e.preventDefault()
      const dur=parseInt(div.dataset.em)-parseInt(div.dataset.sm)
      const newSM=snap15(dragStartMin+(cy-dragStartY)/PX)
      const clampSM=Math.max(START,Math.min(END-dur,newSM))
      div.dataset.sm=clampSM; div.dataset.em=clampSM+dur
      wrap.style.top=(clampSM-START)*PX+'px'
      div.querySelector('.b-time')&&(div.querySelector('.b-time').textContent=`${m2t(clampSM)}–${m2t(clampSM+dur)}`)
    }
  },{passive:false})

  div.addEventListener('touchend',async e=>{
    const moved=Math.abs(e.changedTouches[0].clientX-tx)>6||Math.abs(e.changedTouches[0].clientY-ty)>6
    if(gestureIsSwipe){
      const dx=e.changedTouches[0].clientX-tx
      div.style.transition='transform .2s ease'
      if((!swiped&&dx<-40)||(swiped&&dx<0)){ div.style.transform=`translateX(-${ACT_W}px)`; swiped=true }
      else{ div.style.transform=''; swiped=false }
    } else if(isResizing||isDragging){
      const sm=parseInt(div.dataset.sm), em=parseInt(div.dataset.em)
      isDragging=false; isResizing=false
      if(sm!==b.start_min||em!==b.end_min){
        b.start_min=sm; b.end_min=em
        await fetch(`/planner/${tod()}/block/${b.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({start_min:sm,end_min:em})})
      }
    } else if(!moved){
      // tap → delete only (完成/skip via swipe)
      openModal(`<h2>${b.text}</h2><p style="color:var(--sub);font-size:13px;margin-bottom:16px">${m2t(b.start_min)} – ${m2t(b.end_min)}</p>
        <button class="action-btn" style="background:var(--bg)" onclick="togglePlanDone('${b.id}')">✓ 完成 / 取消完成</button>
        <button class="action-btn" style="background:#FFF9F0;color:#FF9500" onclick="openSkipModal('${b.id}','${b.text.replace(/'/g,"\\'")}')" >⏭ Skip</button>
        <button class="action-btn" style="background:#FFF0F0;color:var(--red)" onclick="deletePlanBlock('${b.id}')">删除</button>
        <button class="action-btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>`)
    }
  })
  return wrap
}

function openSkipModal(id, text){
  closeModal()
  openModal(`<h2>Skip「${text}」</h2>
    <p style="color:var(--sub);font-size:13px;margin-bottom:12px">跳过原因（会保存到待安排）</p>
    <input id="skip-reason" type="text" placeholder="原因…" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:16px;font-family:inherit;background:var(--bg);margin-bottom:16px">
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>
      <button class="btn" style="background:#FF9500;color:white" onclick="submitSkip('${id}','${text.replace(/'/g,"\\'")}')">确认 Skip</button>
    </div>`)
  setTimeout(()=>document.getElementById('skip-reason')?.focus(),100)
}

async function submitSkip(id, text){
  const reason=document.getElementById('skip-reason')?.value||''
  closeModal()
  // mark block as skipped
  await fetch(`/planner/${tod()}/block/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({skipped:true,skip_reason:reason,done:false})})
  // add to pending/backlog
  await fetch('/backlog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,original_date:tod(),skip_reason:reason})})
  loadPlanner()
}

async function togglePlanDone(id){closeModal();await fetch(`/planner/${tod()}/block/${id}/toggle`,{method:'POST'});loadPlanner()}
async function deletePlanBlock(id){closeModal();await fetch(`/planner/${tod()}/block/${id}`,{method:'DELETE'});loadPlanner()}
document.getElementById('planner-add-btn').addEventListener('click',()=>showAddModal('planner',snap15(nowMin())))

// ── Today ─────────────────────────────────────────────────────────
let todayEntries=[]
async function loadToday(){
  const el=document.getElementById('today-scroll'); el.innerHTML='<div class="loading">加载中…</div>'
  try{
    const r=await fetch('/entries/today'); const d=await r.json()
    todayEntries=d.entries||[]
    const total=todayEntries.reduce((s,e)=>s+(e.duration||0),0)
    document.getElementById('today-total').textContent=total>0?`合计 ${fmtM(total)}`:'今天还没有记录'
    const blocks=todayEntries.map(e=>({
      id:e.id, text:e.category, color:c(e.category),
      start_min:t2m((e.start_time||'').substring(11,16)),
      end_min:  t2m((e.end_time||'').substring(11,16)),
    }))
    buildTimelineGrid('today-scroll', blocks,
      b=>openEntryAction(b),
      min=>showAddModal('today', min),
      true  // showQuarter = true for today
    )
  }catch(e){document.getElementById('today-scroll').innerHTML='<div class="empty">加载失败</div>'}
}
function openEntryAction(b){
  const entry=todayEntries.find(e=>String(e.id)===String(b.id))
  if(!entry)return
  openModal(`<h2>${entry.category}</h2>
    <p style="color:var(--sub);font-size:13px;margin-bottom:16px">${(entry.start_time||'').substring(11,16)} – ${(entry.end_time||'').substring(11,16)} · ${fmtM(entry.duration||0)}</p>
    <button class="action-btn" style="background:var(--bg)" onclick="openOverwriteModal(${b.id})">✏️ 修改项目</button>
    <button class="action-btn" style="background:#FFF0F0;color:var(--red)" onclick="deleteEntry(${b.id})">删除</button>
    <button class="action-btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>`)
}
function openOverwriteModal(id){
  closeModal()
  const tasks=[...(appState?.work_tasks||[]),...(appState?.life_tasks||[])]
  const btns=tasks.map(t=>`<button class="modal-task-btn" data-task="${t}" style="border-left-color:${c(t)};color:${c(t)}" onclick="selModalTask(this,'${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')
  openModal(`<h2>修改项目</h2><div class="modal-task-grid">${btns}</div>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="submitOverwrite(${id})">确认</button>
    </div>`)
}
async function submitOverwrite(id){
  if(!selTask){alert('请选择任务');return}
  const task=selTask; closeModal()
  const entry=todayEntries.find(e=>String(e.id)===String(id)); if(!entry)return
  await fetch(`/entries/${id}`,{method:'DELETE'})
  await fetch('/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({start_time:entry.start_time,end_time:entry.end_time,category:task,note:'修改',duration:entry.duration})})
  loadToday()
}
async function deleteEntry(id){closeModal();await fetch(`/entries/${id}`,{method:'DELETE'});loadToday()}
document.getElementById('today-add-btn').addEventListener('click',()=>showAddModal('today',snap15(nowMin())))

// ── Shared add modal ──────────────────────────────────────────────
function showAddModal(target, startMin){
  const tasks=[...(appState?.work_tasks||[]),...(appState?.life_tasks||[])]
  const btns=tasks.map(t=>`<button class="modal-task-btn${selTask===t?' selected':''}" data-task="${t}" style="border-left-color:${c(t)};color:${c(t)}" onclick="selModalTask(this,'${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')
  openModal(`<h2>添加${target==='planner'?'计划块':'记录'}</h2>
    <div class="modal-task-grid">${btns}</div>
    <div class="time-row">
      <div class="time-iw"><label>开始</label><input type="time" id="m-start" value="${m2t(startMin)}"></div>
      <div class="time-iw"><label>结束</label><input type="time" id="m-end"   value="${m2t(startMin+60)}"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="submitAdd('${target}')">添加</button>
    </div>`)
}
function selModalTask(el,task){document.querySelectorAll('.modal-task-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');selTask=task}
async function submitAdd(target){
  if(!selTask){alert('请选择任务');return}
  const sm=t2m(document.getElementById('m-start').value), em=t2m(document.getElementById('m-end').value)
  if(em<=sm){alert('结束时间必须晚于开始时间');return}
  const task=selTask; closeModal()
  if(target==='planner'){
    await fetch(`/planner/${tod()}/blocks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:task,color:c(task),start_min:sm,end_min:em})})
    loadPlanner()
  } else {
    const d=tod(), st=`${d} ${m2t(sm)}:00`, et=`${d} ${m2t(em)}:00`
    await fetch('/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({start_time:st,end_time:et,category:task,note:'补录'})})
    loadToday()
  }
}

// ── Stats ─────────────────────────────────────────────────────────
function setStatsView(v){statsView=v;document.getElementById('view-bar').classList.toggle('active',v==='bar');document.getElementById('view-pie').classList.toggle('active',v==='pie');loadStats()}
document.querySelectorAll('.range-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');statsDays=parseInt(btn.dataset.days);loadStats()})})
async function loadStats(){
  const el=document.getElementById('stats-content'); el.innerHTML='<div class="loading">加载中…</div>'
  try{
    const totals={},promises=[]
    for(let i=0;i<statsDays;i++){const d=new Date();d.setDate(d.getDate()-i);promises.push(fetch(`/entries/${d.toLocaleDateString('sv-SE')}`).then(r=>r.json()))}
    const res=await Promise.all(promises)
    res.forEach(d=>{(d.entries||[]).forEach(e=>{totals[e.category]=(totals[e.category]||0)+(e.duration||0)})})
    const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1])
    if(!sorted.length){el.innerHTML='<div class="empty">暂无数据</div>';return}
    statsView==='bar'?renderBar(el,sorted):renderPie(el,sorted)
  }catch(e){el.innerHTML='<div class="empty">加载失败</div>'}
}
function renderBar(el,sorted){
  const max=sorted[0][1]; el.innerHTML=''
  sorted.forEach(([cat,mins])=>{const r=document.createElement('div');r.className='stat-bar-row';r.innerHTML=`<div class="stat-label" style="color:${c(cat)}">${cat}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${(mins/max*100).toFixed(1)}%;background:${c(cat)}"></div></div><div class="stat-val">${fmtM(mins)}</div>`;el.appendChild(r)})
}
function renderPie(el,sorted){
  const total=sorted.reduce((s,[,m])=>s+m,0), sz=Math.min(window.innerWidth-64,280), cx=sz/2,cy=sz/2,r=sz/2-10
  let angle=-Math.PI/2, paths=''
  sorted.forEach(([cat,mins])=>{const sw=(mins/total)*Math.PI*2,st=Math.max(4,Math.ceil(sw*r/4));let d=`M${cx},${cy}`;for(let i=0;i<=st;i++){const a=angle+(sw*i/st);d+=`L${cx+Math.cos(a)*r},${cy+Math.sin(a)*r}`};d+='Z';paths+=`<path d="${d}" fill="${c(cat)}"/>`;angle+=sw})
  paths+=`<circle cx="${cx}" cy="${cy}" r="${r*.5}" fill="white"/>`
  let legend='<div style="display:flex;flex-direction:column;gap:6px;margin-top:14px">'
  sorted.forEach(([cat,mins])=>{legend+=`<div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${c(cat)};flex-shrink:0"></div><span style="font-size:13px;flex:1">${cat}</span><span style="font-size:12px;color:var(--sub)">${fmtM(mins)} (${(mins/total*100).toFixed(0)}%)</span></div>`})
  legend+='</div>'
  el.innerHTML=`<svg width="${sz}" height="${sz}" style="display:block;margin:0 auto">${paths}</svg>${legend}`
}

// ── Backlog ───────────────────────────────────────────────────────
async function loadBacklog(){
  const el=document.getElementById('backlog-list'); el.innerHTML='<div class="loading">加载中…</div>'
  try{
    const r=await fetch('/backlog'); const d=await r.json(); const items=d.items||[]
    if(!items.length){el.innerHTML='<div style="background:var(--card);border-radius:12px"><div class="empty">没有待安排的事项</div></div>';return}
    el.innerHTML=''
    items.forEach(item=>{
      const text=typeof item==='string'?item:(item.text||''), id=item.id||'', date=item.original_date||'', reason=item.skip_reason||''
      const wrap=document.createElement('div'); wrap.className='backlog-wrap'
      wrap.innerHTML=`<div class="backlog-actions"><button class="backlog-action-btn schedule" data-id="${id}" data-task="${text}">排入</button><button class="backlog-action-btn del" data-id="${id}">删除</button></div><div class="backlog-item"><div class="backlog-dot" style="background:${c(text)}"></div><div><div style="font-size:15px">${text}</div>${date?`<div class="backlog-meta">${date}${reason?' · '+reason:''}</div>`:''}</div></div>`
      const inner=wrap.querySelector('.backlog-item'), actW=120
      let sx=0,swiped=false
      inner.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true})
      inner.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-sx;if(Math.abs(dx)>5){e.preventDefault();inner.style.transform=`translateX(${Math.max(-actW,Math.min(0,dx+(swiped?-actW:0)))}px)`}},{passive:false})
      inner.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if((!swiped&&dx<-40)||(swiped&&dx<0)){inner.style.transform=`translateX(-${actW}px)`;swiped=true}else{inner.style.transform='';swiped=false}})
      wrap.querySelector('.backlog-action-btn.schedule').addEventListener('click',()=>{inner.style.transform='';swiped=false;selTask=text;showAddModal('planner',snap15(nowMin()))})
      wrap.querySelector('.backlog-action-btn.del').addEventListener('click',async()=>{await fetch(`/backlog/${id}`,{method:'DELETE'});loadBacklog()})
      el.appendChild(wrap)
    })
  }catch(e){el.innerHTML='<div style="background:var(--card);border-radius:12px"><div class="empty">加载失败</div></div>'}
}

// ── Init ─────────────────────────────────────────────────────────
loadState()
setInterval(loadState,8000)
</script>
