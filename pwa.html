<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>Orbit</title>
  <style>
    :root {
      --bg: #F2F2F7; --card: #FFFFFF; --text: #000;
      --sub: #8E8E93; --border: rgba(60,60,67,0.12);
      --blue: #007AFF; --green: #34C759; --red: #FF3B30;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }
    #app { flex: 1; overflow: hidden; position: relative; }
    .page {
      position: absolute; inset: 0; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
      display: none;
    }
    .page.active { display: block; }
    #tabbar {
      display: flex; background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1px; padding: 6px 0;
      border: none; background: none; cursor: pointer;
      color: var(--sub); font-size: 9px; font-family: inherit;
    }
    .tab.active { color: var(--blue); }
    .tab-icon { font-size: 20px; line-height: 1.2; }
    .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header span { font-size: 13px; color: var(--sub); }
    .btn { padding: 10px 24px; border-radius: 20px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-green { background: var(--green); color: white; }
    .btn-blue  { background: var(--blue);  color: white; }
    .btn-sm    { padding: 6px 14px; font-size: 13px; border-radius: 14px; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing: 0.3px; margin: 14px 4px 8px; text-transform: uppercase; }
    /* Timer */
    #current-card { text-align: center; padding: 24px 16px 18px; border-left: 5px solid #E2E8F0; transition: border-color 0.3s; }
    #task-name { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--sub); }
    #elapsed { font-size: 54px; font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: -2px; margin-bottom: 18px; line-height: 1; }
    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
    .task-btn { padding: 11px 10px; border-radius: 10px; border: none; background: var(--card); font-size: 13px; font-family: inherit; text-align: left; cursor: pointer; border-left: 3px solid; line-height: 1.3; }
    .task-btn.current { outline: 2px solid; outline-offset: -1px; }
    .checkin-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .checkin-item:last-child { border-bottom: none; }
    .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #C7C7CC; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; transition: all 0.2s; }
    .check-circle.done { background: var(--green); border-color: var(--green); color: white; }
    /* Visual timeline (planner + today) */
    .timeline-wrap { display: flex; position: relative; }
    .time-labels { width: 44px; flex-shrink: 0; position: relative; }
    .time-label { position: absolute; right: 8px; font-size: 10px; color: var(--sub); transform: translateY(-50%); }
    .timeline-grid { flex: 1; position: relative; background: var(--card); border-radius: 10px; overflow: hidden; }
    .hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid var(--border); }
    .half-line  { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(0,0,0,0.05); }
    .timeline-block {
      position: absolute; left: 2px; right: 2px; border-radius: 6px;
      padding: 4px 6px; font-size: 12px; font-weight: 500; cursor: pointer;
      overflow: hidden; display: flex; flex-direction: column; justify-content: center;
      color: white; user-select: none;
    }
    .timeline-block .b-text { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timeline-block .b-time { font-size: 10px; opacity: 0.85; }
    .timeline-block.done { opacity: 0.4; text-decoration: line-through; }
    .now-line { position: absolute; left: 0; right: 0; border-top: 2px solid var(--red); z-index: 5; }
    .now-dot { position: absolute; left: -4px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; top: -4px; }
    /* Stats */
    .view-toggle { display: flex; gap: 6px; }
    .toggle-btn { padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; font-family: inherit; }
    .toggle-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
    .range-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .range-btn { padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; font-family: inherit; }
    .range-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
    .stat-bar-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .stat-bar-row:last-child { border-bottom: none; }
    .stat-label { width: 110px; font-size: 13px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stat-bar-wrap { flex: 1; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
    .stat-bar { height: 100%; border-radius: 5px; }
    .stat-val { width: 38px; font-size: 12px; color: var(--sub); text-align: right; font-variant-numeric: tabular-nums; }
    /* Backlog */
    .backlog-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .backlog-item:last-child { border-bottom: none; }
    .backlog-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .backlog-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
    /* Modal */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: var(--card); border-radius: 18px 18px 0 0; padding: 20px 16px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-height: 88dvh; overflow-y: auto; }
    #modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
    .modal-task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .modal-task-btn { padding: 10px 8px; border-radius: 10px; border: 2px solid transparent; background: var(--bg); font-size: 13px; font-family: inherit; text-align: left; cursor: pointer; border-left: 3px solid; }
    .modal-task-btn.selected { border: 2px solid var(--blue); background: rgba(0,122,255,0.08); }
    .time-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .time-input-wrap { flex: 1; }
    .time-input-wrap label { font-size: 12px; color: var(--sub); display: block; margin-bottom: 4px; }
    .time-input-wrap input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 16px; font-family: inherit; background: var(--bg); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns .btn { flex: 1; }
    .action-btn { padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-family: inherit; cursor: pointer; text-align: center; margin-bottom: 8px; display: block; width: 100%; }
    .empty   { text-align: center; color: var(--sub); padding: 36px 0; font-size: 15px; }
    .loading { text-align: center; color: var(--sub); padding: 20px 0;  font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <!-- TIMER -->
  <div class="page active" id="page-timer">
    <div class="card" id="current-card">
      <div id="task-name">未开始</div>
      <div id="elapsed">—</div>
      <div class="btn-row" id="action-btns"></div>
    </div>
    <div class="section-title">工作</div>
    <div class="task-grid" id="work-tasks"></div>
    <div class="section-title">生活</div>
    <div class="task-grid" id="life-tasks"></div>
    <div class="section-title">今日打卡</div>
    <div class="card" id="checkin-list"><div class="loading">加载中…</div></div>
  </div>

  <!-- PLANNER -->
  <div class="page" id="page-planner">
    <div class="page-header">
      <h1>计划</h1>
      <button class="btn btn-blue btn-sm" id="planner-add-btn">+ 添加</button>
    </div>
    <div id="planner-scroll"></div>
  </div>

  <!-- TODAY (actual entries) -->
  <div class="page" id="page-timeline">
    <div class="page-header">
      <h1>今日记录</h1>
      <button class="btn btn-blue btn-sm" id="today-add-btn">+ 新增</button>
    </div>
    <div id="today-total" style="font-size:13px;color:var(--sub);margin-bottom:12px"></div>
    <div id="today-scroll"></div>
  </div>

  <!-- STATS -->
  <div class="page" id="page-stats">
    <div class="page-header">
      <h1>统计</h1>
      <div class="view-toggle">
        <button class="toggle-btn active" id="view-bar" onclick="setStatsView('bar')">条形</button>
        <button class="toggle-btn" id="view-pie" onclick="setStatsView('pie')">饼图</button>
      </div>
    </div>
    <div class="range-row" id="stats-range">
      <button class="range-btn active" data-days="7">近7天</button>
      <button class="range-btn" data-days="14">近14天</button>
      <button class="range-btn" data-days="30">近30天</button>
    </div>
    <div class="card" id="stats-content"><div class="loading">加载中…</div></div>
  </div>

  <!-- BACKLOG -->
  <div class="page" id="page-backlog">
    <div class="page-header"><h1>待办</h1></div>
    <div class="card" id="backlog-list"><div class="loading">加载中…</div></div>
  </div>
</div>

<nav id="tabbar">
  <button class="tab active" data-page="timer">   <span class="tab-icon">⏱</span><span>计时</span></button>
  <button class="tab" data-page="planner">        <span class="tab-icon">📅</span><span>计划</span></button>
  <button class="tab" data-page="timeline">       <span class="tab-icon">📊</span><span>今日</span></button>
  <button class="tab" data-page="stats">          <span class="tab-icon">📈</span><span>统计</span></button>
  <button class="tab" data-page="backlog">        <span class="tab-icon">📋</span><span>待办</span></button>
</nav>

<div id="modal-overlay"><div id="modal"></div></div>

<script>
const COLORS = {
  '📈 交易学习':'#E07068','🔮 塔罗分析':'#9880CC','✍️ 写文章/卡片':'#E8956A',
  '💻 折腾/开发':'#5B8FD4','📷 摄影/画廊':'#81D8D0','🗂️ 系统/杂事':'#64748B',
  '😴 睡眠':'#6C5CE7','📱 刷手机':'#7AB0D4','☕ 放松/休息':'#8B5A38',
  '🏃 运动':'#72B87A','🍽️ 吃饭/家务':'#DDB86A','🧘 冥想':'#68B868','📔 日记':'#E8A0BF',
}
const PX = 1.2, START = 5*60, END = 24*60

function c(t) { return COLORS[t] || '#94A3B8' }
function fmt(s) { s=Math.floor(s); const m=Math.floor(s/60),h=Math.floor(m/60); return h>0?`${h}:${String(m%60).padStart(2,'0')}`:`${m}m ${String(s%60).padStart(2,'0')}s` }
function fmtM(m) { const h=Math.floor(m/60),r=m%60; return h>0?`${h}h${r>0?r+'m':''}`:`${r}m` }
function m2t(m) { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}` }
function t2m(s) { const[h,m]=s.split(':').map(Number); return h*60+(m||0) }
function tod()  { return new Date().toLocaleDateString('sv-SE') }
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes() }

let appState=null, timerInt=null, statsDays=7, statsView='bar', selTask=null

// ── Tabs ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = btn.dataset.page
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active')
    document.getElementById('page-'+p).classList.add('active')
    if(p==='planner')  loadPlanner()
    if(p==='timeline') loadToday()
    if(p==='stats')    loadStats()
    if(p==='backlog')  loadBacklog()
  })
})

// ── Modal ─────────────────────────────────────────────────────────
function openModal(html) { document.getElementById('modal').innerHTML=html; document.getElementById('modal-overlay').classList.add('open') }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); selTask=null }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal() })

// ── Timer ─────────────────────────────────────────────────────────
async function sendCmd(action,task,item) {
  const b={action,timestamp:new Date().toISOString()}
  if(task) b.task=task; if(item) b.item=item
  try { await fetch('/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}) } catch(e){}
  await loadState()
}
async function loadState() {
  try { const r=await fetch('/state'); appState=await r.json(); renderTimer() } catch(e){}
}
function renderTimer() {
  if(!appState) return
  const task=appState.current_task, col=task?c(task):'#E2E8F0'
  document.getElementById('current-card').style.borderLeftColor=col
  const ne=document.getElementById('task-name'); ne.textContent=task||'未开始'; ne.style.color=task?col:'var(--sub)'
  if(task&&appState.task_start) { document.getElementById('elapsed').textContent=fmt((Date.now()-new Date(appState.task_start).getTime())/1000); startTimer(appState.task_start) }
  else { clearInterval(timerInt); document.getElementById('elapsed').textContent='—' }
  const be=document.getElementById('action-btns'); be.innerHTML=''
  if(task) { const b=document.createElement('button'); b.className='btn btn-green'; b.textContent='结束'; b.onclick=()=>sendCmd('finish'); be.appendChild(b) }
  renderGrid('work-tasks',appState.work_tasks||[],task)
  renderGrid('life-tasks',appState.life_tasks||[],task)
  renderCheckin(appState.checkin_items||[],appState.checkin_done||[])
}
function startTimer(ts) { clearInterval(timerInt); timerInt=setInterval(()=>{ document.getElementById('elapsed').textContent=fmt((Date.now()-new Date(ts).getTime())/1000) },1000) }
function renderGrid(id,tasks,cur) {
  const el=document.getElementById(id); el.innerHTML=''
  tasks.forEach(t=>{ const b=document.createElement('button'); b.className='task-btn'+(t===cur?' current':''); b.textContent=t; b.style.borderLeftColor=c(t); b.style.color=c(t); if(t===cur)b.style.outlineColor=c(t); b.onclick=()=>sendCmd('start',t); el.appendChild(b) })
}
function renderCheckin(items,done) {
  const el=document.getElementById('checkin-list')
  if(!items.length){el.innerHTML='<div class="empty">无打卡项目</div>';return}
  el.innerHTML=''
  items.forEach(item=>{ const d=done.includes(item); const r=document.createElement('div'); r.className='checkin-item'; r.innerHTML=`<div class="check-circle ${d?'done':''}">${d?'✓':''}</div><span style="color:${d?'var(--sub)':'var(--text)'};text-decoration:${d?'line-through':'none'}">${item}</span>`; r.onclick=()=>sendCmd('checkin_toggle',null,item); el.appendChild(r) })
}

// ── Shared visual grid ────────────────────────────────────────────
function buildGrid(blocks, containerId, onBlockTap) {
  const el=document.getElementById(containerId), totalH=(END-START)*PX
  let labels='', lines=''
  for(let h=START/60;h<=END/60;h++) {
    const y=(h*60-START)*PX
    labels+=`<div class="time-label" style="top:${y}px">${String(h).padStart(2,'0')}:00</div>`
    lines+=`<div class="hour-line" style="top:${y}px"></div>`
    if(h<END/60) lines+=`<div class="half-line" style="top:${y+30*PX}px"></div>`
  }
  const nm=nowMin(), ny=(Math.min(nm,END)-START)*PX
  const nowHtml=nm>=START&&nm<=END?`<div class="now-line" style="top:${ny}px"><div class="now-dot"></div></div>`:''

  let bHtml=blocks.length?'':'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;pointer-events:none">点右上角 + 添加</div>'
  blocks.forEach(b=>{
    const top=(b.start_min-START)*PX, h=Math.max((b.end_min-b.start_min)*PX,20)
    const col=b.color||c(b.text||b.category)
    const done=b.done?' done':''
    bHtml+=`<div class="timeline-block${done}" data-id="${b.id||''}" style="top:${top}px;height:${h}px;background:${col}">
      <div class="b-text">${b.text||b.category}</div>
      ${h>28?`<div class="b-time">${m2t(b.start_min)}–${m2t(b.end_min)}</div>`:''}
    </div>`
  })

  el.innerHTML=`<div class="timeline-wrap"><div class="time-labels" style="height:${totalH}px">${labels}</div><div class="timeline-grid" style="height:${totalH}px" id="${containerId}-grid">${lines}${nowHtml}${bHtml}</div></div>`
  el.querySelectorAll('.timeline-block').forEach(el=>{ el.addEventListener('click',e=>{ e.stopPropagation(); onBlockTap(el.dataset.id) }) })
  el.scrollTop=Math.max(0,(Math.min(nm,END)-START-60)*PX)
}

// ── Planner ───────────────────────────────────────────────────────
async function loadPlanner() {
  const el=document.getElementById('planner-scroll'); el.innerHTML='<div class="loading">加载中…</div>'
  try { const r=await fetch(`/planner/${tod()}`); const d=await r.json(); renderPlanner(d.blocks||[]) }
  catch(e){ el.innerHTML='<div class="empty">加载失败</div>' }
}
function renderPlanner(blocks) {
  const sorted=[...blocks].sort((a,b)=>a.start_min-b.start_min)
  buildGrid(sorted,'planner-scroll', id=>openBlockAction(id))
}
function openBlockAction(id) {
  openModal(`<h2>操作</h2>
    <button class="action-btn" style="background:var(--bg)" onclick="togglePlanDone('${id}')">✓ 标记完成 / 取消</button>
    <button class="action-btn" style="background:#FFF0F0;color:var(--red)" onclick="deletePlanBlock('${id}')">删除</button>
    <button class="action-btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>`)
}
async function togglePlanDone(id) { closeModal(); await fetch(`/planner/${tod()}/block/${id}/toggle`,{method:'POST'}); loadPlanner() }
async function deletePlanBlock(id) { closeModal(); await fetch(`/planner/${tod()}/block/${id}`,{method:'DELETE'}); loadPlanner() }

document.getElementById('planner-add-btn').addEventListener('click', ()=>showAddBlockModal('planner'))

// ── Today ─────────────────────────────────────────────────────────
async function loadToday() {
  const el=document.getElementById('today-scroll'); el.innerHTML='<div class="loading">加载中…</div>'
  try {
    const r=await fetch('/entries/today'); const d=await r.json()
    const entries=d.entries||[]
    const total=entries.reduce((s,e)=>s+(e.duration||0),0)
    document.getElementById('today-total').textContent=total>0?`合计 ${fmtM(total)}`:'今天还没有记录'
    const blocks=entries.map(e=>({
      id: e.id, text: e.category, color: c(e.category),
      start_min: t2m((e.start_time||'').substring(11,16)),
      end_min:   t2m((e.end_time||'').substring(11,16)),
      start_time: e.start_time, end_time: e.end_time
    }))
    buildGrid(blocks,'today-scroll', id=>openEntryAction(id, entries))
  } catch(e){ document.getElementById('today-scroll').innerHTML='<div class="empty">加载失败</div>' }
}
function openEntryAction(id, entries) {
  const entry=entries.find(e=>String(e.id)===String(id))
  if(!entry) return
  openModal(`<h2>${entry.category}</h2>
    <p style="color:var(--sub);font-size:13px;margin-bottom:16px">${(entry.start_time||'').substring(11,16)} – ${(entry.end_time||'').substring(11,16)}  ·  ${fmtM(entry.duration||0)}</p>
    <button class="action-btn" style="background:var(--bg)" onclick="openOverwriteModal(${id})">✏️ 修改项目</button>
    <button class="action-btn" style="background:#FFF0F0;color:var(--red)" onclick="deleteEntry(${id})">删除</button>
    <button class="action-btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>`)
}
function openOverwriteModal(id) {
  closeModal()
  const tasks=[...(appState?.work_tasks||[]),...(appState?.life_tasks||[])]
  const taskBtns=tasks.map(t=>`<button class="modal-task-btn" data-task="${t}" style="border-left-color:${c(t)};color:${c(t)}" onclick="selModalTask(this,'${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')
  openModal(`<h2>修改项目</h2><div class="modal-task-grid">${taskBtns}</div>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="submitOverwrite(${id})">确认</button>
    </div>`)
}
async function submitOverwrite(id) {
  if(!selTask){alert('请选择任务');return}
  const task=selTask; closeModal()
  // get existing entry times
  const r=await fetch('/entries/today'); const d=await r.json()
  const entry=(d.entries||[]).find(e=>String(e.id)===String(id))
  if(!entry) return
  await fetch(`/entries/${id}`,{method:'DELETE'})
  await fetch('/entries',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({start_time:entry.start_time,end_time:entry.end_time,category:task,note:'修改',duration:entry.duration})})
  loadToday()
}
async function deleteEntry(id) { closeModal(); await fetch(`/entries/${id}`,{method:'DELETE'}); loadToday() }

document.getElementById('today-add-btn').addEventListener('click',()=>showAddBlockModal('today'))

// ── Shared add block modal ────────────────────────────────────────
function showAddBlockModal(target) {
  const tasks=[...(appState?.work_tasks||[]),...(appState?.life_tasks||[])]
  const snap=Math.round(nowMin()/15)*15
  const taskBtns=tasks.map(t=>`<button class="modal-task-btn" data-task="${t}" style="border-left-color:${c(t)};color:${c(t)}" onclick="selModalTask(this,'${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')
  openModal(`<h2>添加${target==='planner'?'计划块':'记录'}</h2>
    <div class="modal-task-grid">${taskBtns}</div>
    <div class="time-row">
      <div class="time-input-wrap"><label>开始</label><input type="time" id="m-start" value="${m2t(snap)}"></div>
      <div class="time-input-wrap"><label>结束</label><input type="time" id="m-end"   value="${m2t(snap+60)}"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" style="background:var(--bg);color:var(--sub)" onclick="closeModal()">取消</button>
      <button class="btn btn-blue" onclick="submitAdd('${target}')">添加</button>
    </div>`)
}
function selModalTask(el, task) {
  document.querySelectorAll('.modal-task-btn').forEach(b=>b.classList.remove('selected'))
  el.classList.add('selected'); selTask=task
}
async function submitAdd(target) {
  if(!selTask){alert('请选择任务');return}
  const sm=t2m(document.getElementById('m-start').value), em=t2m(document.getElementById('m-end').value)
  if(em<=sm){alert('结束时间必须晚于开始时间');return}
  const task=selTask; closeModal()
  if(target==='planner') {
    await fetch(`/planner/${tod()}/blocks`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:task,color:c(task),start_min:sm,end_min:em})})
    loadPlanner()
  } else {
    const d=tod()
    const st=`${d} ${m2t(sm)}:00`, et=`${d} ${m2t(em)}:00`
    await fetch('/entries',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({start_time:st,end_time:et,category:task,note:'补录'})})
    loadToday()
  }
}

// ── Stats ─────────────────────────────────────────────────────────
function setStatsView(v) {
  statsView=v
  document.getElementById('view-bar').classList.toggle('active',v==='bar')
  document.getElementById('view-pie').classList.toggle('active',v==='pie')
  loadStats()
}
document.querySelectorAll('.range-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); statsDays=parseInt(btn.dataset.days); loadStats() })
})
async function loadStats() {
  const el=document.getElementById('stats-content'); el.innerHTML='<div class="loading">加载中…</div>'
  try {
    const totals={}, promises=[]
    for(let i=0;i<statsDays;i++) { const d=new Date(); d.setDate(d.getDate()-i); promises.push(fetch(`/entries/${d.toLocaleDateString('sv-SE')}`).then(r=>r.json())) }
    const res=await Promise.all(promises)
    res.forEach(d=>{ (d.entries||[]).forEach(e=>{ totals[e.category]=(totals[e.category]||0)+(e.duration||0) }) })
    const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1])
    if(!sorted.length){el.innerHTML='<div class="empty">暂无数据</div>';return}
    if(statsView==='bar') renderBarChart(el,sorted)
    else renderPieChart(el,sorted)
  } catch(e){el.innerHTML='<div class="empty">加载失败</div>'}
}
function renderBarChart(el, sorted) {
  const max=sorted[0][1]; el.innerHTML=''
  sorted.forEach(([cat,mins])=>{ const r=document.createElement('div'); r.className='stat-bar-row'; r.innerHTML=`<div class="stat-label" style="color:${c(cat)}">${cat}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${(mins/max*100).toFixed(1)}%;background:${c(cat)}"></div></div><div class="stat-val">${fmtM(mins)}</div>`; el.appendChild(r) })
}
function renderPieChart(el, sorted) {
  const total=sorted.reduce((s,[,m])=>s+m,0)
  const size=Math.min(window.innerWidth-64, 280)
  const cx=size/2, cy=size/2, r=size/2-10
  let angle=-Math.PI/2, paths=''
  sorted.forEach(([cat,mins])=>{
    const sweep=(mins/total)*Math.PI*2, steps=Math.max(4,Math.ceil(sweep*r/4))
    let d=`M${cx},${cy}`
    for(let i=0;i<=steps;i++){ const a=angle+(sweep*i/steps); d+=`L${cx+Math.cos(a)*r},${cy+Math.sin(a)*r}` }
    d+='Z'; paths+=`<path d="${d}" fill="${c(cat)}"/>`; angle+=sweep
  })
  // donut hole
  paths+=`<circle cx="${cx}" cy="${cy}" r="${r*0.5}" fill="white"/>`
  // legend
  let legend='<div style="display:flex;flex-direction:column;gap:6px;margin-top:14px">'
  sorted.forEach(([cat,mins])=>{ legend+=`<div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${c(cat)};flex-shrink:0"></div><span style="font-size:13px;flex:1">${cat}</span><span style="font-size:12px;color:var(--sub)">${fmtM(mins)} (${(mins/total*100).toFixed(0)}%)</span></div>` })
  legend+='</div>'
  el.innerHTML=`<svg width="${size}" height="${size}" style="display:block;margin:0 auto">${paths}</svg>${legend}`
}

// ── Backlog ───────────────────────────────────────────────────────
async function loadBacklog() {
  const el=document.getElementById('backlog-list'); el.innerHTML='<div class="loading">加载中…</div>'
  try {
    const r=await fetch('/backlog'); const d=await r.json(); const items=d.items||[]
    if(!items.length){el.innerHTML='<div class="empty">没有待办事项</div>';return}
    el.innerHTML=''
    items.forEach(item=>{
      const text=typeof item==='string'?item:item.text
      const date=item.original_date||''; const reason=item.skip_reason||''
      const row=document.createElement('div'); row.className='backlog-item'
      row.innerHTML=`<div class="backlog-dot" style="background:${c(text)}"></div><div><div style="font-size:15px">${text}</div>${date?`<div class="backlog-meta">${date}${reason?' · '+reason:''}</div>`:''}</div>`
      el.appendChild(row)
    })
  } catch(e){document.getElementById('backlog-list').innerHTML='<div class="empty">加载失败</div>'}
}

// ── Init ─────────────────────────────────────────────────────────
loadState()
setInterval(loadState, 8000)
</script>
